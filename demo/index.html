<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>HEART Metrics — Work Wellbeing Platform</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<meta name="description" content="HEART Metrics turns everyday employee signals into early burnout warnings — so managers can intervene before top talent walks." />

<meta property="og:description" content="AI that helps managers retain top talent. Live prototype." />

<style>
  :root {
    --hm-dark:   #0C4A4E;
    --hm-teal:   #00B8A0;
    --hm-amber:  #FFB347;
    --hm-red:    #DC2626;
    --hm-green:  #16A34A;
    --hm-yellow: #EAB308;
    --hm-bg:     #F5F8F8;
    --hm-border: #E3EAEA;
  }
  html, body { background: var(--hm-bg); }
  body {
    font-family: "Calibri", "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    color: #1F2937;
    -webkit-font-smoothing: antialiased;
  }
  .font-serif, h1, h2, h3, .serif { font-family: Georgia, "Times New Roman", Cambria, serif; }
  .card { background: #fff; border: 1px solid var(--hm-border); border-radius: 14px; }
  .card-shadow { box-shadow: 0 1px 2px rgba(12,74,78,.04), 0 2px 8px rgba(12,74,78,.04); }
  .card-shadow-lg { box-shadow: 0 10px 30px rgba(12,74,78,.10), 0 4px 10px rgba(12,74,78,.06); }
  .hm-dark { background-color: var(--hm-dark); }
  .hm-teal { background-color: var(--hm-teal); }
  .hm-teal-text { color: var(--hm-teal); }
  .hm-dark-text { color: var(--hm-dark); }
  .hm-gradient { background: linear-gradient(135deg, #0C4A4E 0%, #00B8A0 100%); }
  .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #cfdada; border-radius: 4px; }
  .fade-in { animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .tooltip-trigger:hover .tooltip-body { opacity: 1; pointer-events: auto; }
  .tooltip-body { opacity: 0; pointer-events: none; transition: opacity .15s; }
  .sidebar-item.active { background: rgba(0,184,160,.12); color: #fff; border-left-color: var(--hm-teal); }
  .ring-track { stroke: #E3EAEA; }
  .metric-row { border-bottom: 1px solid #EEF2F2; }
  .metric-row:last-child { border-bottom: 0; }
  /* Mobile sidebar drawer */
  .sidebar-base { position: fixed; top: 0; bottom: 0; left: 0; transition: transform .25s ease; }
  .sidebar-closed { transform: translateX(-100%); }
  .sidebar-open { transform: translateX(0); }
  @media (min-width: 768px) {
    .sidebar-base { position: sticky; top: 0; min-height: 100vh; transform: none !important; }
  }
  /* Prevent body scroll when mobile menu open */
  body.menu-open { overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

// ============================================================
// BRAND LOGO
// ============================================================
const HeartLogo = ({ size = 36 }) => (
  <svg width={size} height={size} viewBox="108 108 168 168" xmlns="http://www.w3.org/2000/svg" style={{ display:'block' }}>

      transform="translate(190,190) scale(3.0) translate(-25,-23)" fill="#00B8A0"/>
    <path d="M 25 46 C 7 35 0 26 0 17 C 0 7 8 0 16 0 C 20 0 24 2 25 6 C 26 2 30 0 34 0 C 42 0 50 7 50 17 C 50 26 43 35 25 46 Z"
      transform="translate(190,190) scale(1.75) translate(-25,-23)" fill="#FFB347" stroke="white" strokeWidth="6" paintOrder="stroke fill"/>
    <polyline points="115,190 124,190 127,181 131,200 135,177 139,190 150,190"
      fill="none" stroke="white" strokeWidth="4.5" strokeLinecap="round" strokeLinejoin="round"/>
    <polyline points="230,190 235,190 239,163 244,218 249,158 254,190 265,190"
      fill="none" stroke="white" strokeWidth="4.5" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);

// ============================================================
// TOAST (global demo-mode notification)
// ============================================================
const DEMO_TOAST_MSG = "This action will be enabled once your work systems are connected. You're viewing demo mode.";
const Toast = ({ message, onClose }) => {
  if (!message) return null;
  return (
    <div className="fixed bottom-4 right-4 md:bottom-6 md:right-6 z-50 max-w-sm fade-in" style={{ animation:'fadeIn .25s ease' }}>
      <div className="rounded-xl shadow-2xl p-4 flex items-start gap-3 text-white" style={{ background:'#0C4A4E' }}>
        <div className="text-xl shrink-0" style={{ color:'var(--hm-amber)' }}>✨</div>
        <div className="flex-1 text-sm leading-snug">{message}</div>
        <button onClick={onClose} className="text-white/60 hover:text-white text-xl leading-none w-6 h-6 flex items-center justify-center -mr-1 -mt-1" aria-label="Close">×</button>
      </div>
    </div>
  );
};

// ============================================================
// DATA
// ============================================================
const EMPLOYEES = [
  { employee_id:'E001', name:'Riya S.',    role:'Analyst',         team:'AR Ops',      manager:'Alex M.',   wip_tickets:9,  meeting_hours:12.5, blocked_items:3, avg_blocked_days:4.2, after_hours:3.0, recognition_public:0, recognition_private:1, missed_1on1s:2, strategic_work_points:5,  total_work_points:40, whi_trend:-7, avatar:'RS', color:'bg-rose-500' },
  { employee_id:'E002', name:'Diego M.',   role:'Specialist',      team:'Billing',     manager:'Jordan K.', wip_tickets:8,  meeting_hours:9.0,  blocked_items:1, avg_blocked_days:2.0, after_hours:1.5, recognition_public:0, recognition_private:1, missed_1on1s:1, strategic_work_points:12, total_work_points:35, whi_trend:0,  avatar:'DM', color:'bg-amber-500' },
  { employee_id:'E003', name:'Emma L.',    role:'Senior Analyst',  team:'AR Ops',      manager:'Alex M.',   wip_tickets:6,  meeting_hours:6.0,  blocked_items:0, avg_blocked_days:0.0, after_hours:0.5, recognition_public:2, recognition_private:1, missed_1on1s:0, strategic_work_points:20, total_work_points:40, whi_trend:5,  avatar:'EL', color:'bg-emerald-500' },
  { employee_id:'E004', name:'Noah P.',    role:'Analyst',         team:'Collections', manager:'Taylor R.', wip_tickets:7,  meeting_hours:8.5,  blocked_items:2, avg_blocked_days:3.1, after_hours:1.0, recognition_public:1, recognition_private:0, missed_1on1s:1, strategic_work_points:8,  total_work_points:35, whi_trend:-3, avatar:'NP', color:'bg-sky-500' },
  { employee_id:'E005', name:'Priya K.',   role:'Analyst',         team:'Billing',     manager:'Jordan K.', wip_tickets:5,  meeting_hours:7.0,  blocked_items:0, avg_blocked_days:0.0, after_hours:0.2, recognition_public:0, recognition_private:0, missed_1on1s:2, strategic_work_points:10, total_work_points:30, whi_trend:1,  avatar:'PK', color:'bg-fuchsia-500' },
  { employee_id:'E006', name:'Chen W.',    role:'Team Lead',       team:'Collections', manager:'Taylor R.', wip_tickets:6,  meeting_hours:10.0, blocked_items:0, avg_blocked_days:0.0, after_hours:1.2, recognition_public:3, recognition_private:1, missed_1on1s:0, strategic_work_points:18, total_work_points:38, whi_trend:4,  avatar:'CW', color:'bg-indigo-500' },
  { employee_id:'E007', name:'Sam T.',     role:'Ops Specialist',  team:'AR Ops',      manager:'Alex M.',   wip_tickets:10, meeting_hours:5.5,  blocked_items:1, avg_blocked_days:2.4, after_hours:2.8, recognition_public:0, recognition_private:1, missed_1on1s:2, strategic_work_points:3,  total_work_points:35, whi_trend:-5, avatar:'ST', color:'bg-red-500' },
  { employee_id:'E008', name:'Fatima A.',  role:'Analyst',         team:'Billing',     manager:'Jordan K.', wip_tickets:6,  meeting_hours:7.5,  blocked_items:0, avg_blocked_days:0.0, after_hours:0.6, recognition_public:1, recognition_private:0, missed_1on1s:1, strategic_work_points:11, total_work_points:32, whi_trend:2,  avatar:'FA', color:'bg-teal-500' },
  { employee_id:'E009', name:'Mason H.',   role:'Analyst',         team:'Collections', manager:'Taylor R.', wip_tickets:7,  meeting_hours:8.0,  blocked_items:2, avg_blocked_days:5.0, after_hours:1.0, recognition_public:0, recognition_private:0, missed_1on1s:1, strategic_work_points:7,  total_work_points:33, whi_trend:0,  avatar:'MH', color:'bg-orange-500' },
  { employee_id:'E010', name:'Olivia B.',  role:'Junior Analyst',  team:'AR Ops',      manager:'Alex M.',   wip_tickets:4,  meeting_hours:6.5,  blocked_items:0, avg_blocked_days:0.0, after_hours:0.2, recognition_public:1, recognition_private:0, missed_1on1s:0, strategic_work_points:14, total_work_points:32, whi_trend:3,  avatar:'OB', color:'bg-violet-500' },
];

// ============================================================
// CALCULATION ENGINE
// ============================================================
const CAPACITY = 6;
const clamp = (v) => Math.min(100, Math.max(0, v));

const calcWorkloadBreakdown = (e) => ({
  wip:        clamp(100 - (e.wip_tickets - CAPACITY) * 10),
  meeting:    clamp(100 - (e.meeting_hours - 10) * 5),
  blocked:    clamp(100 - e.blocked_items * 10 - e.avg_blocked_days * 2),
  afterHours: clamp(100 - e.after_hours * 10),
});
const calcW = (e) => { const b = calcWorkloadBreakdown(e); return b.wip*0.35 + b.meeting*0.20 + b.blocked*0.20 + b.afterHours*0.25; };
const calcR = (e) => Math.min(100, (e.recognition_public + e.recognition_private) * 20);
const calcF = (e) => Math.max(0, 100 - e.missed_1on1s * 20);
const calcGOG = (e) => { const ratio = e.strategic_work_points / e.total_work_points; return Math.max(0, ((0.50 - ratio) / 0.50) * 100); };
const calcWWI = (e) => calcW(e)*0.30 + calcR(e)*0.25 + calcF(e)*0.25 + (100-calcGOG(e))*0.20;

const getWWIBand = (w) => {
  if (w >= 85) return { label:'Thriving', color:'#00B8A0', bg:'#CCF1EC', text:'#006655' };
  if (w >= 75) return { label:'Healthy',  color:'#65A30D', bg:'#ECFCCB', text:'#3F6212' };
  if (w >= 65) return { label:'Watch',    color:'#EAB308', bg:'#FEF3C7', text:'#854D0E' };
  if (w >= 50) return { label:'At Risk',  color:'#F97316', bg:'#FFEBDD', text:'#C04000' };
  return           { label:'Critical', color:'#E5484D', bg:'#FDE4E4', text:'#9C1D1D' };
};

// Team averages (computed from EMPLOYEES)
const teamAvg = {
  wip:  EMPLOYEES.reduce((s,e)=>s+e.wip_tickets,0)/EMPLOYEES.length,                            // 6.8
  mtg:  EMPLOYEES.reduce((s,e)=>s+e.meeting_hours,0)/EMPLOYEES.length,                          // 8.05
  rec:  EMPLOYEES.reduce((s,e)=>s+e.recognition_public+e.recognition_private,0)/EMPLOYEES.length,// 1.3
  grow: EMPLOYEES.reduce((s,e)=>s+e.strategic_work_points/e.total_work_points,0)/EMPLOYEES.length*100, // ~31
};

// Human-readable metrics for each employee
const fmtMetrics = (e) => {
  const recTotal = e.recognition_public + e.recognition_private;
  const growPct = Math.round(e.strategic_work_points / e.total_work_points * 100);
  const blockedDays = e.avg_blocked_days;
  return {
    workload:    { label:`${e.wip_tickets} WIP (cap ${CAPACITY})`,
                   tone: e.wip_tickets > 8 ? 'red' : e.wip_tickets >= 7 ? 'amber' : 'normal' },
    blocked:     { label: e.blocked_items === 0 ? '0 items' : `${e.blocked_items} item${e.blocked_items===1?'':'s'} · avg ${blockedDays.toFixed(1)}d blocked`,
                   tone: e.blocked_items > 1 || blockedDays > 3 ? 'red' : e.blocked_items === 1 && blockedDays >= 2 ? 'amber' : 'normal' },
    meeting:     { label:`${e.meeting_hours} h/week (avg 8h)`,
                   tone: e.meeting_hours > 11 ? 'red' : e.meeting_hours >= 9 ? 'amber' : 'normal' },
    recognition: { label:`${recTotal} this month (avg 1–2)`,
                   tone: recTotal === 0 ? 'red' : recTotal === 1 ? 'amber' : 'normal' },
    growth:      { label:`${growPct}% strategic (team avg 31%)`,
                   tone: growPct < 20 ? 'red' : growPct < 30 ? 'amber' : 'normal' },
  };
};

const toneHex = { red:'var(--hm-red)', amber:'#B87900', normal:'var(--hm-dark)' };

// Issue pill per employee
const getIssue = (e) => {
  const rec = e.recognition_public + e.recognition_private;
  const growPct = e.strategic_work_points / e.total_work_points;
  if (e.wip_tickets > 8 && e.blocked_items >= 2)                return { label:'Blocked + Overloaded', tone:'red' };
  if (e.wip_tickets >= 9)                                        return { label:'High firefighting',   tone:'orange' };
  if (e.blocked_items >= 2)                                      return { label:'Blocked work',        tone:'orange' };
  if (growPct < 0.22)                                            return { label:'Growth stalled',      tone:'yellow' };
  if (rec === 0)                                                 return { label:'Recognition gap',     tone:'blue' };
  if (e.missed_1on1s >= 2)                                       return { label:'Feedback gap',        tone:'blue' };
  if (e.meeting_hours > 10)                                      return { label:'Meeting overload',    tone:'yellow' };
  return { label:'Medium risk', tone:'yellow' };
};
const issueStyles = {
  red:    { bg:'#FDE4E4', text:'#9C1D1D' },
  orange: { bg:'#FFE4D0', text:'#B43F00' },
  yellow: { bg:'#FFF4CC', text:'#8A6A00' },
  blue:   { bg:'#DCEEF7', text:'#0B5E8A' },
  green:  { bg:'#E7F7EE', text:'#0F7C3B' },
};

// Team-aware AI recommendations
const getAIAction = (e) => {
  const rec = e.recognition_public + e.recognition_private;
  const growPct = e.strategic_work_points / e.total_work_points;
  const teammatesWithSpare = EMPLOYEES.filter(x => x.team === e.team && x.employee_id !== e.employee_id && x.wip_tickets < CAPACITY).map(x=>x.name.split(' ')[0]);
  const spare = teammatesWithSpare.length ? teammatesWithSpare.slice(0,2).join(' & ') : 'the team';
  const strongPeer = EMPLOYEES.filter(x => x.team === e.team && x.employee_id !== e.employee_id).sort((a,b)=>calcWWI(b)-calcWWI(a))[0];
  const strongPeerName = strongPeer ? strongPeer.name.split(' ')[0] : 'a teammate';

  if (e.blocked_items >= 2 && e.wip_tickets > CAPACITY) return `Redistribute 2 blocked items to ${spare}`;
  if (e.wip_tickets >= 9)                               return `Rotate ${e.name.split(' ')[0]} onto strategic work — ${strongPeerName} can cover tactical load`;
  if (e.blocked_items >= 2)                             return `Unblock 2 tickets — schedule 15-min sync with ${e.manager}`;
  if (growPct < 0.22)                                   return `Assign one strategic initiative — draft peer recognition for ${e.name.split(' ')[0]}`;
  if (rec === 0 && e.missed_1on1s >= 2)                 return `Schedule overdue 1:1 — draft appreciation note`;
  if (rec === 0)                                        return `Draft peer recognition for ${e.name.split(' ')[0]} in the ${e.team} channel`;
  if (e.missed_1on1s >= 2)                              return `Schedule overdue 1:1 with ${e.name.split(' ')[0]}`;
  return `Keep monitoring — weekly check-in with ${e.name.split(' ')[0]}`;
};

// ============================================================
// CHART PRIMITIVES
// ============================================================
const RingChart = ({ value, max=100, size=180, stroke=18, color='var(--hm-amber)', label }) => {
  const r = (size - stroke) / 2;
  const cx = size/2, cy = size/2;
  const angle = (Math.min(value, max) / max) * 360;
  // Start at 12 o'clock, sweep COUNTER-clockwise so the filled arc covers the LEFT side
  const startRad = -Math.PI/2;
  const endRad   = startRad - (angle * Math.PI / 180);
  const x1 = cx + r * Math.cos(startRad), y1 = cy + r * Math.sin(startRad);
  const x2 = cx + r * Math.cos(endRad),   y2 = cy + r * Math.sin(endRad);
  const largeArc = angle > 180 ? 1 : 0;
  const sweep = 0; // 0 = counter-clockwise in SVG path arcs
  const pathD = angle >= 359.9
    ? `M ${cx} ${cy - r} A ${r} ${r} 0 1 0 ${cx - 0.01} ${cy - r} Z`
    : `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} ${sweep} ${x2} ${y2}`;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" className="ring-track" strokeWidth={stroke}/>
      <path d={pathD} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round"/>
      <text x={cx} y={cy+size*0.08} textAnchor="middle" fontFamily="Georgia, serif" fontSize={size*0.34} fontWeight="700" fill={color}>{Math.round(value)}</text>
      {label && <text x={cx} y={cy+size*0.28} textAnchor="middle" fontSize="11" fill="#6b7a7a">{label}</text>}
    </svg>
  );
};

const Sparkline = ({ data, w=140, h=42, color='var(--hm-teal)' }) => {
  const min = Math.min(...data), max = Math.max(...data);
  const pts = data.map((v,i) => [ (i/(data.length-1))*w, h - ((v-min)/Math.max(1,max-min)) * (h-6) - 3 ]);
  const path = pts.map((p,i)=>`${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="3" fill={color}/>
    </svg>
  );
};

const LineChart = ({ data, height = 260 }) => {
  const w = 480, pad = { t:20, r:14, b:52, l:50 };
  const min = Math.floor(Math.min(...data.map(d=>d.wwi)) - 3);
  const max = Math.ceil(Math.max(...data.map(d=>d.wwi)) + 3);
  const xStep = (w - pad.l - pad.r) / (data.length - 1);
  const yScale = (v) => pad.t + (height - pad.t - pad.b) * (1 - (v - min) / (max - min));
  const points = data.map((d,i) => [pad.l + i*xStep, yScale(d.wwi)]);
  const path = points.map((p,i) => `${i===0?'M':'L'}${p[0]},${p[1]}`).join(' ');
  const areaPath = path + ` L${points[points.length-1][0]},${height-pad.b} L${points[0][0]},${height-pad.b} Z`;
  const ticks = 4;
  const yTicks = Array.from({length:ticks+1}, (_,i) => min + (max-min)*i/ticks);
  return (
    <svg viewBox={`0 0 ${w} ${height}`} className="w-full h-full" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#00B8A0" stopOpacity="0.28" />
          <stop offset="100%" stopColor="#00B8A0" stopOpacity="0" />
        </linearGradient>
      </defs>
      {/* Y-axis label */}
      <text x={14} y={pad.t + (height-pad.t-pad.b)/2} fontSize="12" fill="#4A6666" textAnchor="middle" transform={`rotate(-90 14 ${pad.t + (height-pad.t-pad.b)/2})`} fontFamily="Georgia, serif">Team WWI</text>
      {/* Y gridlines & tick labels */}
      {yTicks.map((v,i)=>(
        <g key={i}>
          <line x1={pad.l} x2={w-pad.r} y1={yScale(v)} y2={yScale(v)} stroke="#EEF2F2" strokeDasharray="3 3"/>
          <text x={pad.l-6} y={yScale(v)+4} fontSize="12" fill="#7A8989" textAnchor="end">{Math.round(v)}</text>
        </g>
      ))}
      {/* X-axis line */}
      <line x1={pad.l} x2={w-pad.r} y1={height-pad.b} y2={height-pad.b} stroke="#CFDADA" strokeWidth="1"/>
      {/* Area + line */}
      <path d={areaPath} fill="url(#lg)" />
      <path d={path} fill="none" stroke="#00B8A0" strokeWidth="2.5" strokeLinejoin="round"/>
      {/* Points + X-axis date labels */}
      {points.map((p,i)=>(
        <g key={i}>
          <circle cx={p[0]} cy={p[1]} r="4" fill="#fff" stroke="#00B8A0" strokeWidth="2"/>
          <text x={p[0]} y={height-pad.b+16} fontSize="12" fill="#4A6666" textAnchor="middle">{data[i].period}</text>
        </g>
      ))}
      {/* X-axis title */}
      <text x={(w-pad.l-pad.r)/2 + pad.l} y={height-6} fontSize="11" fill="#7A8989" textAnchor="middle">Sprint end date (2-week cadence)</text>
    </svg>
  );
};

const DonutChart = ({ data, size = 180 }) => {
  const total = data.reduce((s,d)=>s+d.value, 0);
  const cx = size/2, cy = size/2, r = size/2 - 12, ir = r - 22;
  let acc = 0;
  const arcs = data.map((d) => {
    const start = acc / total * 2 * Math.PI - Math.PI/2;
    acc += d.value;
    const end = acc / total * 2 * Math.PI - Math.PI/2;
    const large = end - start > Math.PI ? 1 : 0;
    const x1 = cx + r*Math.cos(start), y1 = cy + r*Math.sin(start);
    const x2 = cx + r*Math.cos(end),   y2 = cy + r*Math.sin(end);
    const xi2 = cx + ir*Math.cos(end),  yi2 = cy + ir*Math.sin(end);
    const xi1 = cx + ir*Math.cos(start),yi1 = cy + ir*Math.sin(start);
    return { path: `M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} L${xi2},${yi2} A${ir},${ir} 0 ${large} 0 ${xi1},${yi1} Z`, color: d.color };
  });
  return (
    <div className="flex items-center gap-4">
      <svg viewBox={`0 0 ${size} ${size}`} style={{ width:size, height:size }}>
        {arcs.map((a,i)=><path key={i} d={a.path} fill={a.color} />)}
        <text x={cx} y={cy-4} textAnchor="middle" fontFamily="Georgia, serif" fontSize="22" fontWeight="700" fill="var(--hm-dark)">{total}</text>
        <text x={cx} y={cy+14} textAnchor="middle" fontSize="10" fill="#7A8989">Employees</text>

const BarChart = ({ data, height = 150 }) => {
  const w = 360, pad = { t:10, r:10, b:36, l:30 };
  const max = Math.max(...data.map(d=>d.value), 1);
  const barW = (w - pad.l - pad.r) / data.length - 8;
  return (
    <svg viewBox={`0 0 ${w} ${height}`} className="w-full">
      {data.map((d,i) => {
        const h = (height - pad.t - pad.b) * (d.value / max);
        const x = pad.l + i*((w-pad.l-pad.r)/data.length) + 4;
        const y = height - pad.b - h;
        return (
          <g key={i}>
            <rect x={x} y={y} width={barW} height={h} fill={d.color} rx="4"/>
            <text x={x + barW/2} y={y - 4} fontSize="11" fontWeight="600" fill="var(--hm-dark)" textAnchor="middle">{d.value}</text>
            <text x={x + barW/2} y={height-pad.b+14} fontSize="10" fill="#7A8989" textAnchor="middle">{d.label}</text>
          </g>
        );
      })}
    </svg>
  );
};

const getRecommendations = (e) => {
  const wwi = calcWWI(e), gog = calcGOG(e);
  const recs = [];
  if (wwi < 50)                                            recs.push({ kind:'1on1',        label:'Schedule 1:1',        urgency:'high',   icon:'📅' });
  if (e.wip_tickets > CAPACITY)                            recs.push({ kind:'reassign',    label:'Reassign workload',   urgency:'high',   icon:'↔️' });
  if (e.blocked_items > 1)                                 recs.push({ kind:'unblock',     label:'Unblock tasks',       urgency:'medium', icon:'🔓' });
  if (e.recognition_public + e.recognition_private === 0)  recs.push({ kind:'recognition', label:'Send recognition',    urgency:'medium', icon:'🎉' });
  if (gog > 60)                                            recs.push({ kind:'strategic',   label:'Assign strategic work', urgency:'high', icon:'🎯' });
  if (e.missed_1on1s >= 2)                                 recs.push({ kind:'feedback',    label:'Catch up on feedback',urgency:'medium', icon:'💬' });
  return recs;
};

const aiRecognition = (e) => {
  const strength = e.wip_tickets > CAPACITY ? `handling a heavy workload of ${e.wip_tickets} active tickets`
                 : e.recognition_public + e.recognition_private > 2 ? 'consistent high-quality delivery'
                 : `steady execution on the ${e.team} team`;
  return `Hi ${e.name.split(' ')[0]},\n\nI wanted to take a moment to recognize the effort you've been putting in on the ${e.team} team. Your work — especially ${strength} — has not gone unnoticed.\n\nThank you for the consistency and care you bring to the work every day. It makes a real difference to the team.\n\n— ${e.manager}`;
};
const aiFeedback = (e) => {
  const R = calcR(e), F = calcF(e), GOG = calcGOG(e);
  let strength = 'Reliable delivery and strong ownership of assigned work.';
  if (GOG < 30) strength = 'Strong balance of tactical execution and strategic thinking.';
  if (e.recognition_public + e.recognition_private >= 3) strength = 'Recognized by peers and leaders — a positive force on the team.';
  let improvement = 'General room to push into higher-leverage work.';
  if (e.wip_tickets > CAPACITY) improvement = `Workload management — currently at ${e.wip_tickets} tickets vs. the ${CAPACITY}-ticket team capacity. Items are taking longer to resolve.`;
  else if (e.blocked_items > 1) improvement = `Proactive unblocking — ${e.blocked_items} items averaging ${e.avg_blocked_days}d blocked is slowing throughput.`;
  else if (GOG > 60) improvement = `Strategic contribution — only ${Math.round((e.strategic_work_points/e.total_work_points)*100)}% of work points are on strategic items (team target: 50%).`;
  else if (F < 60) improvement = `1:1 consistency — ${e.missed_1on1s} missed sessions this cycle.`;
  let action = 'Pick one growth-stretch project this sprint and own the definition.';
  if (e.wip_tickets > CAPACITY) action = `Partner with ${e.manager} to reassign 2–3 tickets and set a WIP cap at ${CAPACITY}. Check in weekly.`;
  else if (e.blocked_items > 1) action = `Escalate any blocker aging beyond 2 days. Book a 15-min unblock sync with ${e.manager} by end of week.`;
  else if (GOG > 60) action = `Identify one strategic initiative for the next sprint. Reallocate ~25% of tactical load toward it.`;
  else if (F < 60) action = `Lock the weekly 1:1 on both calendars as "no-reschedule." Bring one growth topic each session.`;
  return { strength, improvement, action };
};
const aiDifficultConversation = (e) => {
  const firstName = e.name.split(' ')[0];
  let topic = 'general wellbeing concerns';
  if (e.wip_tickets > CAPACITY && e.after_hours >= 2) topic = 'workload overload and after-hours work';
  else if (calcR(e) < 40 && e.missed_1on1s >= 2) topic = 'disengagement risk';
  else if (calcWWI(e) < 50) topic = 'declining wellbeing indicators';
  return {
    topic,
    steps: [
      { label:'Open with care',   body:`"${firstName}, I wanted to carve out some dedicated time because I care about how you're doing — not just what you're delivering. I've noticed a few things recently and want to check in."` },
      { label:'State observation (no judgment)', body:`"Over the last sprint, I've noticed ${e.wip_tickets > CAPACITY ? `you're carrying ${e.wip_tickets} tickets against our ${CAPACITY}-ticket capacity` : ''}${e.after_hours >= 2 ? `, and logging about ${e.after_hours} hours after-hours each week` : ''}${calcR(e) < 40 ? `, and it's been quiet on recognition lately` : ''}. That's what I'm seeing — I want to hear how it feels from your side."` },
      { label:'Ask open question', body:`"What's feeling heaviest right now? And what would meaningfully help?"` },
      { label:"Listen — don't solve", body:`Let them speak for at least 3–5 minutes uninterrupted. Reflect back what you hear before responding.` },
      { label:'Co-create an action', body:`"Here's what I can do this week: reassign two tickets to ${e.team==='AR Ops'?'Olivia':'Fatima'}, protect one no-meeting afternoon, and cover your backlog during our next sprint planning. Would that help?"` },
      { label:'Close with commitment', body:`"Let's check in again Thursday — 20 minutes, just the two of us. And please flag anything before then that makes this worse. I've got you."` },
    ]
  };
};

    <div className="fixed inset-0 bg-black/40 z-40 flex items-end md:items-center justify-center p-0 md:p-4" onClick={onClose}>
      <div className="bg-white rounded-t-2xl md:rounded-2xl card-shadow-lg max-w-lg w-full max-h-[90vh] overflow-y-auto fade-in" onClick={e=>e.stopPropagation()}>
        <div className="sticky top-0 px-5 md:px-6 py-4 md:py-5" style={{ background:'#FFF0EA' }}>
          <div className="flex items-start justify-between gap-3">
            <div className="flex items-center gap-3 min-w-0">
              <div className={`${employee.color} w-11 h-11 rounded-full flex items-center justify-center text-white font-semibold shrink-0`}>{employee.avatar}</div>
              <div className="min-w-0">
                <div className="serif text-xl md:text-2xl font-bold hm-dark-text truncate">{employee.name} <span className="font-normal text-gray-500"> — {employee.role}</span></div>
                <div className="text-xs text-gray-500 truncate">{employee.team} · Manager: {employee.manager}</div>
              </div>
            </div>
            <button onClick={onClose} className="text-gray-400 hover:text-gray-700 text-3xl leading-none w-11 h-11 flex items-center justify-center -mr-2 -mt-1 shrink-0" aria-label="Close">×</button>
          </div>
        </div>

        <div className="px-5 md:px-6 py-2">
          <Row label="Workload"      metric={m.workload}/>
          <Row label="Blocked Items" metric={m.blocked}/>
          <Row label="Meeting Load"  metric={m.meeting}/>
          <Row label="Recognition"   metric={m.recognition}/>
          <Row label="Growth"        metric={m.growth}/>
        </div>

        <div className="px-5 md:px-6 pb-5 md:pb-6 pt-3">
          <button onClick={demoAction} className="w-full text-left rounded-xl p-4 text-white font-semibold text-[15px] flex items-start gap-2 hover:opacity-95 transition cursor-pointer" style={{ background:'#0C4A4E', boxShadow:'0 0 0 3px rgba(0,184,160,.25)' }}>
            <span style={{ color:'var(--hm-amber)' }}>✨</span>
            <span className="flex-1"><span className="hm-teal-text">AI:</span> {ai}</span>
            <span className="text-[11px] font-normal text-white/60 shrink-0">Tap to run</span>
          </button>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// LAYOUT SHELL
// ============================================================
const Sidebar = ({ tab, setTab, mobileOpen, setMobileOpen }) => {
  const groups = [
    { label:'Main', items:[
      { id:'dashboard',   label:'Overview',    icon:'📊' },
      { id:'team',        label:'My Team',     icon:'👥' },
      { id:'actions',     label:'Actions',     icon:'⚡' },
    ]},
    { label:'Coaching', items:[
      { id:'ai',          label:'AI Coaching', icon:'🤖' },
    ]},
    { label:'Setup', items:[
      { id:'integrations',label:'Integrations',icon:'🔌' },
      { id:'data',        label:'Data Sources',icon:'🗂',  disabled:true },
      { id:'settings',    label:'Settings',    icon:'⚙️',  disabled:true },
    ]},
  ];
  const handleTab = (id) => { setTab(id); setMobileOpen(false); };
  return (
    <>
      {/* Mobile overlay backdrop */}
      {mobileOpen && <div className="md:hidden fixed inset-0 bg-black/40 z-30" onClick={()=>setMobileOpen(false)}/>}
      <aside className={`sidebar-base ${mobileOpen ? 'sidebar-open' : 'sidebar-closed'} hm-dark text-white w-60 md:w-64 shrink-0 flex flex-col z-40`}>
        <div className="pl-2 pr-2 py-3 border-b border-white/10 flex items-center justify-between gap-1">
          <a href="/" className="flex items-center gap-1 min-w-0 hover:opacity-90 transition" title="Back to HEART Metrics home" style={{ textDecoration:'none', color:'inherit' }}>
            <div className="shrink-0"><HeartLogo size={70}/></div>
            <div className="min-w-0">
              <div className="serif font-bold text-lg leading-tight whitespace-nowrap">HEART Metrics</div>
              <div className="text-[11px] text-white/60 leading-tight mt-0.5">Work Wellbeing Platform</div>
            </div>
          </a>
          <button onClick={()=>setMobileOpen(false)} className="md:hidden text-white/70 hover:text-white text-2xl leading-none w-8 h-8 flex items-center justify-center shrink-0" aria-label="Close menu">×</button>
        </div>
        <nav className="flex-1 py-4 overflow-y-auto">
          {groups.map(g => (
            <div key={g.label} className="mb-4">
              <div className="px-5 text-[10px] uppercase tracking-[.15em] text-white/50 font-semibold mb-2">{g.label}</div>
              {g.items.map(item => {
                const active = tab === item.id;
                return (
                  <button key={item.id} disabled={item.disabled} onClick={()=>!item.disabled && handleTab(item.id)}
                    className={`w-full flex items-center gap-3 px-5 py-3 text-[14px] border-l-2 transition ${active?'sidebar-item active font-semibold':'border-transparent text-white/75 hover:bg-white/5 hover:text-white'} ${item.disabled?'opacity-40 cursor-not-allowed':''}`}>
                    <span className="text-base">{item.icon}</span>
                    <span>{item.label}</span>
                    {item.disabled && <span className="ml-auto text-[9px] px-1.5 py-0.5 rounded bg-white/10">soon</span>}
                  </button>
                );
              })}
            </div>
          ))}
        </nav>
        <div className="px-5 py-4 border-t border-white/10 text-[11px] text-white/50">
          Prototype build · v2
        </div>
      </aside>
    </>
  );
};

const TopBar = ({ tabLabel, onOpenMenu }) => (
  <header className="card-shadow bg-white border-b border-gray-100 sticky top-0 z-10">
    <div className="flex items-center justify-between px-4 md:px-8 py-3 gap-3">
      <div className="flex items-center gap-3 min-w-0">
        <button onClick={onOpenMenu} className="md:hidden w-11 h-11 -ml-2 rounded-lg hover:bg-gray-100 flex items-center justify-center shrink-0" aria-label="Open menu">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0C4A4E" strokeWidth="2" strokeLinecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <a href="/" className="md:hidden shrink-0" title="Back to HEART Metrics home" style={{ background:'var(--hm-dark)', borderRadius:8, padding:5, textDecoration:'none' }}>
          <HeartLogo size={32}/>
        </a>
        <div className="min-w-0">
          <div className="text-[11px] text-gray-400 uppercase tracking-wide hidden md:block">Manager View</div>
          <div className="serif text-base md:text-lg font-semibold hm-dark-text truncate">{tabLabel}</div>
        </div>
      </div>
      <div className="flex items-center gap-2 md:gap-3 shrink-0">
        <a href="/" className="hidden md:inline-flex items-center gap-1.5 text-xs font-medium text-gray-600 hover:text-gray-900 px-2" style={{ textDecoration:'none' }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back to home
        </a>
        <div className="relative hidden lg:block">
          <input placeholder="Find people and teams" className="text-sm border border-gray-200 rounded-lg px-3 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-teal-200 w-64"/>
        </div>
        <button className="relative w-11 h-11 rounded-full border border-gray-200 hover:bg-gray-50 flex items-center justify-center" aria-label="Notifications">🔔
          <span className="absolute top-1 right-1 w-4 h-4 rounded-full text-[9px] font-semibold text-white flex items-center justify-center" style={{ background:'var(--hm-red)' }}>4</span>
        </button>
        <div className="flex items-center gap-2">
          <div className="w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-semibold" style={{ background:'var(--hm-dark)' }}>AM</div>
          <div className="hidden lg:block leading-tight">
            <div className="text-sm font-semibold hm-dark-text">Alex Morgan</div>
            <div className="text-[11px] text-gray-500">Engineering Manager</div>
          </div>
        </div>
      </div>
    </div>
  </header>
);

// ============================================================
// APP
// ============================================================
const App = () => {
  const [tab, setTab] = useState('dashboard');
  const [selected, setSelected] = useState(null);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const showToast = (msg) => {
    setToast(msg || DEMO_TOAST_MSG);
    clearTimeout(window.__hmToastT);
    window.__hmToastT = setTimeout(() => setToast(null), 4500);
  };
  const demoAction = () => showToast();
  useEffect(() => {
    document.body.classList.toggle('menu-open', mobileOpen);
    return () => document.body.classList.remove('menu-open');
  }, [mobileOpen]);
  const tabLabels = {
    dashboard:'Overview · Dashboard',
    team:'My Team',
    actions:'Action Queue',
    ai:'AI Coaching',
    integrations:'Integrations',
  };
  return (
    <div className="min-h-screen flex">
      <Sidebar tab={tab} setTab={setTab} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen}/>
      <div className="flex-1 min-w-0">
        <TopBar tabLabel={tabLabels[tab] || 'HEART Metrics'} onOpenMenu={()=>setMobileOpen(true)}/>
        <main className="px-4 md:px-8 py-4 md:py-6 max-w-[1400px] mx-auto">
          {tab === 'dashboard'    && <Dashboard onSelectEmployee={setSelected} onGoToActions={()=>setTab('actions')} demoAction={demoAction}/>}
          {tab === 'team'         && <Team onSelectEmployee={setSelected} demoAction={demoAction}/>}
          {tab === 'actions'      && <Actions onSelectEmployee={setSelected} demoAction={demoAction}/>}
          {tab === 'ai'           && <AICoaching demoAction={demoAction}/>}
          {tab === 'integrations' && <Integrations demoAction={demoAction}/>}
        </main>
        <footer className="px-4 md:px-8 py-6 text-center text-[11px] md:text-xs text-gray-400">
          HEART Metrics · Demo build · Synthetic data for illustration only
        </footer>
      </div>
      <EmployeeModal employee={selected} onClose={()=>setSelected(null)} demoAction={demoAction}/>
      <Toast message={toast} onClose={()=>setToast(null)}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
